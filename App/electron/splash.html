<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Loading</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #1e1e1e;
      overflow: hidden;
      border-radius: 8px;
      user-select: none;
      -webkit-app-region: drag;
    }

    .close-btn {
      position: fixed;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      background: transparent;
      border: none;
      border-radius: 4px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
      transition: background 0.15s, color 0.15s;
      z-index: 10;
    }

    .close-btn:hover {
      background: #e81123;
      color: #fff;
    }

    .video-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    img {
      max-width: 70%;
      max-height: 70%;
    }

    .message {
      position: fixed;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255, 255, 255, 0.45);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      -webkit-app-region: no-drag;
    }
  </style>
</head>
<body>
  <button class="close-btn" onclick="window.close()" title="Close">✕</button>
  <div class="video-container">
    <img src="loading.gif" alt="Loading animation">
  </div>
  <div class="message">Starting Pointer...</div>
</body>
</html>
